<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AZ-900 Academy</title><link rel="stylesheet" href="css/style.css"></head><body>
<header><div><h1>AZ-900 Academy</h1><p>Eine URL. Automatische Freischaltung. Keine manuellen Erweiterungen nötig.</p></div><div><button id="themeBtn">🌙</button><button id="resetBtn">Reset</button></div></header>
<main>
<section id="dash" class="view active"><div class="card hero"><div><h2>Dashboard</h2><p id="status" class="muted"></p></div><div class="badges"><span id="xp"></span><span id="lvl"></span><span id="streak"></span></div></div>
<div class="grid"><div class="card"><h3>Fortschritt</h3><div class="bar"><i id="overall"></i></div><p id="overallText" class="muted"></p></div><div class="card"><h3>Training</h3><button onclick="start('learn')">Lernmodus</button><button onclick="start('weak')">Fehlertraining</button><button onclick="showCards()">Lernkarten</button></div><div class="card"><h3>Prüfung</h3><p class="muted">50 Zufallsfragen, Lösung am Ende.</p><button onclick="start('exam')">Prüfungsmodus</button></div></div>
<div class="card"><h3>Suche</h3><input id="search" placeholder="Policy, RBAC, Blob..." oninput="renderSearch()"><div id="results"></div></div>
<div class="card"><h3>Module & automatische Freischaltung</h3><div id="mods"></div></div></section>
<section id="quiz" class="view"><div class="card quiz"><div class="meta"><span id="mode"></span><span id="num"></span><span id="cat"></span><span id="lev"></span></div><div class="bar"><i id="qbar"></i></div><p id="type" class="muted"></p><h2 id="qtext"></h2><div id="opts"></div><button onclick="check()">Antwort prüfen</button><button id="next" onclick="next()" disabled>Nächste</button><button onclick="dashboard()">Dashboard</button><div id="fb"></div></div></section>
<section id="cards" class="view"><div class="card quiz"><h2>Lernkarten</h2><p id="cardMeta" class="muted"></p><div id="card" onclick="flip()"></div><button onclick="nextCard()">Nächste</button><button onclick="dashboard()">Dashboard</button></div></section>
<section id="res" class="view"><div class="card"><h2>Auswertung</h2><div id="score"></div><p id="resText" class="muted"></p><button onclick="dashboard()">Dashboard</button><button onclick="start('weak')">Fehler üben</button><div id="review"></div></div></section>
</main><script src="js/app.js"></script></body></html>
